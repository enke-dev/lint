name: check

on:
  # reused by release.yml (PR + trunk) and update-dependencies.yml (bumped branch)
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out and test (defaults to the triggering ref)
        type: string
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # empty ref → checkout's default (the triggering ref); set by callers to test a branch
          ref: ${{ inputs.ref }}
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      # required by the `test:bun` suite (test.run.bun.ts)
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install
        run: npm ci
      - name: Check
        run: npm run check
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
